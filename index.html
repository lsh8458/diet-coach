<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홈트 다이어트 코치 (MVP-0)</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css');
  :root{
    --bg:#fff6f9; --card:rgba(255,255,255,.72); --ink:#463a43; --muted:#7c6b77;
    --pink:#ff8fb1; --lav:#b28dff;
    --accent:#ff8fb1; --accent-ink:#b23a6d; --accent-soft:#ffe6f0;
    --line:rgba(190,150,180,.24); --good:#3f9e77; --warn:#b57a1e; --danger:#c14d78;
    --glow:0 14px 44px rgba(255,150,195,.20);
    --shadow:0 14px 44px rgba(255,150,195,.20);
    --grad:linear-gradient(92deg,#e0568f,#7c58ff);
  }
  *{box-sizing:border-box}
  body{margin:0;color:var(--ink);position:relative;min-height:100vh;
    font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    line-height:1.58;-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(1000px 620px at 8% -6%, #ffe1ec 0%, rgba(255,225,236,0) 56%),
      radial-gradient(900px 620px at 104% 2%, #ece0ff 0%, rgba(236,224,255,0) 55%),
      radial-gradient(820px 720px at 50% 112%, #fdeede 0%, rgba(253,238,222,0) 55%),
      linear-gradient(160deg,#fff6f9 0%,#f6f0ff 100%);
    background-attachment:fixed;}
  body::before,body::after{content:"";position:fixed;z-index:-1;border-radius:50%;filter:blur(64px);opacity:.5;pointer-events:none}
  body::before{width:300px;height:300px;left:-90px;top:70px;background:radial-gradient(circle,#ffc2d8,transparent 70%);animation:floaty 9s ease-in-out infinite}
  body::after{width:340px;height:340px;right:-120px;top:42%;background:radial-gradient(circle,#cdb6ff,transparent 70%);animation:floaty 12s ease-in-out infinite reverse}
  .wrap{max-width:560px;margin:0 auto;padding:20px 16px 60px}
  h1{font-size:1.35rem;margin:0 0 4px}
  h2{font-size:1.05rem;margin:0 0 12px}
  .sub{color:var(--muted);font-size:.9rem;margin:0 0 20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
  label{display:block;font-size:.9rem;font-weight:600;margin:14px 0 6px}
  input,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;
    font-size:1rem;background:#fffdfc;color:var(--ink)}
  input:focus,select:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
  .row{display:flex;gap:10px}
  .row>div{flex:1}
  .check{display:flex;align-items:flex-start;gap:9px;margin-top:12px;font-size:.9rem;font-weight:500}
  .check input{width:auto;margin-top:3px}
  button{font-family:inherit;cursor:pointer;border:none}
  .btn{width:100%;padding:14px;background:var(--accent);color:#fff;border-radius:12px;
    font-size:1.05rem;font-weight:700;margin-top:20px;transition:.15s}
  .btn:hover{background:var(--accent-ink)}
  .btn.ghost{background:var(--accent-soft);color:var(--accent-ink)}
  .banner{padding:12px 14px;border-radius:10px;font-size:.9rem;margin-top:14px;display:none}
  .banner.show{display:block}
  .banner.err{background:#fdeeed;color:var(--danger);border:1px solid #f3cfcc}
  .banner.warn{background:#fdf4e6;color:var(--warn);border:1px solid #f0dcb4}
  .pill{display:inline-block;background:var(--accent-soft);color:var(--accent-ink);
    font-size:.78rem;font-weight:700;padding:4px 10px;border-radius:999px}
  .kcal{font-size:2rem;font-weight:800;color:var(--accent-ink);letter-spacing:-.5px}
  .kcal small{font-size:.95rem;color:var(--muted);font-weight:600}
  .meal{padding:10px 0;border-bottom:1px dashed var(--line)}
  .meal:last-child{border-bottom:none}
  .meal .t{font-weight:700;font-size:.85rem;color:var(--accent-ink)}
  .meal .d{font-size:.95rem}
  .daynav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .daynav button{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:8px 14px;font-size:1rem;color:var(--ink)}
  .daynav button:disabled{opacity:.35}
  .daynav .now{text-align:center}
  .daynav .now b{font-size:1.1rem}
  .wk{font-size:.75rem;color:var(--muted);display:block;margin-top:2px}
  .video-wrap{position:relative;padding-bottom:56.25%;height:0;border-radius:12px;overflow:hidden;margin:8px 0 4px;background:#000}
  .video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
  .vmeta{font-size:.85rem;color:var(--muted);margin-bottom:16px}
  .vmeta b{color:var(--ink)}
  .focus{font-size:1.05rem;font-weight:700;margin-bottom:2px}
  .warmup{font-size:.88rem;background:var(--accent-soft);
    padding:8px 12px;border-radius:8px;margin:8px 0 14px;color:var(--accent-ink)}
  .done-row{display:flex;gap:10px;align-items:center;margin-top:6px}
  .done-btn{flex:1;padding:12px;border-radius:12px;font-weight:700;font-size:1rem;
    background:var(--accent-soft);color:var(--accent-ink)}
  .done-btn.on{background:var(--good);color:#fff}
  .streak{font-size:.85rem;color:var(--muted);white-space:nowrap}
  .footer{font-size:.78rem;color:var(--muted);text-align:center;margin-top:24px;line-height:1.6}
  .note{font-size:.82rem;color:var(--muted);margin-top:8px}
  .block-view{text-align:center;padding:30px 18px}
  .block-view .em{font-size:2.4rem}
  .macro{font-size:.85rem;color:var(--muted);margin-top:10px;background:#fbf8f6;padding:10px 12px;border-radius:8px}
  .tools{display:flex;gap:10px;margin-top:8px}
  .tools button{flex:1;padding:10px;border-radius:10px;background:var(--card);
    border:1px solid var(--line);color:var(--ink);font-size:.88rem}
  .rest .video-wrap{display:none}
  a.link{color:var(--accent-ink)}
  .done-view{text-align:center;padding:14px;background:var(--accent-soft);border-radius:12px;color:var(--accent-ink);font-weight:700;margin-bottom:16px}
  .mrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed var(--line);color:var(--ink);font-size:.95rem}
  .mrow:last-child{border-bottom:none}
  .mn{font-weight:700}
  .mp{color:var(--muted);font-size:.88rem}
  #groupCard input[type=text]{margin-top:4px}

  /* ===== 파스텔 소프트 & 글로우 ===== */
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(26px)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
  .wrap{max-width:520px;padding:26px 18px 72px}
  .hero{display:block;width:100%;max-width:260px;margin:0 auto 8px;filter:drop-shadow(0 12px 24px rgba(255,150,190,.28));animation:fadeUp .5s ease both}
  .celebrate{display:block;width:128px;margin:0 auto 8px}
  h1{font-size:1.72rem;font-weight:800;letter-spacing:-.5px;line-height:1.22;
     background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  h2{font-size:1.08rem;font-weight:800;color:#5a4a55}
  .sub{color:var(--muted);font-weight:500}
  .card{background:var(--card);border:1px solid rgba(255,255,255,.65);border-radius:26px;padding:20px;
     margin-bottom:18px;box-shadow:var(--glow),inset 0 1px 0 rgba(255,255,255,.7);
     -webkit-backdrop-filter:blur(16px) saturate(1.25);backdrop-filter:blur(16px) saturate(1.25);
     animation:fadeUp .45s ease both}
  label{font-weight:700;color:#6a5a64;margin:16px 0 6px}
  input,select{border:1.5px solid rgba(190,150,180,.3);border-radius:14px;background:rgba(255,255,255,.82);color:var(--ink);padding:13px}
  input::placeholder{color:#c3b3bd}
  input:focus,select:focus{outline:none;border-color:var(--pink);box-shadow:0 0 0 4px rgba(255,143,177,.18)}
  .btn{background:linear-gradient(135deg,#ff9cbe,#b79bff);border-radius:18px;font-weight:800;
     box-shadow:0 10px 26px rgba(255,140,190,.34);transition:transform .15s ease,box-shadow .15s ease}
  .btn:hover{background:linear-gradient(135deg,#ff8db4,#aa8cff);transform:translateY(-2px);box-shadow:0 14px 32px rgba(255,140,190,.42)}
  .btn.ghost{background:var(--accent-soft);color:var(--accent-ink);box-shadow:none}
  .pill{background:linear-gradient(135deg,#ffe0ee,#ece1ff);color:var(--accent-ink);font-weight:800;padding:5px 14px}
  .kcal{font-size:2.35rem;font-weight:800;letter-spacing:-1px;
     background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .kcal small{-webkit-text-fill-color:var(--muted);color:var(--muted);font-weight:600}
  .meal{border-bottom:1px dashed rgba(190,150,180,.3)}
  .meal .t{color:var(--accent-ink)}
  .daynav button{background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.7);border-radius:14px;
     color:var(--accent-ink);font-weight:800;box-shadow:0 6px 18px rgba(200,160,190,.2)}
  .daynav .now b{color:#5a4a55}
  .video-wrap{border-radius:18px;box-shadow:0 8px 22px rgba(180,140,190,.22)}
  .warmup{background:linear-gradient(135deg,#fff0f6,#f1ebff);color:var(--accent-ink);border-radius:12px;font-weight:600}
  .done-btn{background:linear-gradient(135deg,#ffe0ee,#ece1ff);color:var(--accent-ink);border-radius:14px;transition:.15s}
  .done-btn.on{background:linear-gradient(135deg,#6fd3a6,#4bbf90);color:#fff;box-shadow:0 8px 20px rgba(80,190,140,.32)}
  .tools button{background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.7);border-radius:14px;
     color:var(--accent-ink);font-weight:700;box-shadow:0 6px 18px rgba(200,160,190,.18)}
  .banner.err{background:#ffe9f1;color:#b23a6d;border-color:#ffc9dc}
  .macro{background:linear-gradient(135deg,rgba(255,240,247,.75),rgba(240,235,255,.75));border-radius:14px;color:#8a7a84}
  .note{color:var(--muted)}
  .done-view{background:linear-gradient(135deg,#ffe0ee,#e3d6ff);color:var(--accent-ink);border-radius:16px;
     box-shadow:var(--glow);animation:pop .4s ease both}
  .block-view .em{filter:drop-shadow(0 6px 12px rgba(255,150,190,.4))}
  .mrow{border-bottom:1px dashed rgba(190,150,180,.3)}
  a.link{color:var(--accent-ink);font-weight:700}
  /* 그룹 진행 대시보드 */
  .gsum{font-size:.86rem;color:#7a6a76;background:linear-gradient(135deg,#fff0f6,#f1ebff);
     border-radius:13px;padding:10px 12px;margin-bottom:12px;text-align:center}
  .gsum b{color:var(--accent-ink);font-weight:800}
  .mcard{padding:9px 0}
  .mcard+.mcard{border-top:1px dashed rgba(190,150,180,.28)}
  .mtop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .mbar{height:9px;border-radius:999px;background:rgba(190,150,180,.18);overflow:hidden}
  .mfill{height:100%;border-radius:999px;background:linear-gradient(90deg,#ff9cbe,#b79bff);
     box-shadow:0 1px 6px rgba(255,140,190,.4);transition:width .6s ease}
  .mcard.me .mn::after{content:" (나)";color:var(--muted);font-weight:600;font-size:.8rem}
  /* 전체 스케줄판 */
  .sched{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-top:12px}
  .scell{aspect-ratio:1;border-radius:12px;border:1.5px solid rgba(190,150,180,.28);
     background:rgba(255,255,255,.7);color:#9a8b96;font-weight:800;font-size:.9rem;
     display:flex;align-items:center;justify-content:center;transition:transform .12s ease}
  .scell:hover{transform:translateY(-2px)}
  .scell.done{background:linear-gradient(135deg,#ff9cbe,#b79bff);color:#fff;border-color:transparent;
     box-shadow:0 5px 14px rgba(255,140,190,.35)}
  .scell.rest{background:rgba(190,150,180,.12);color:#c3b3bd;font-size:.78rem}
  .scell.cur{outline:2.5px solid var(--pink);outline-offset:1px}
  .slegend{display:flex;gap:14px;justify-content:center;margin-top:12px;font-size:.78rem;color:var(--muted)}
  .slegend span{display:flex;align-items:center;gap:5px}
  .slegend .dot{width:11px;height:11px;border-radius:4px;display:inline-block}
  .slegend .d1{background:linear-gradient(135deg,#ff9cbe,#b79bff)}
  .slegend .d2{background:#fff;outline:2px solid var(--pink);outline-offset:-1px}
  .slegend .d3{background:rgba(190,150,180,.2)}
  .linklike{background:none;border:none;color:var(--accent-ink);font-weight:700;font-size:.85rem;padding:4px 0;cursor:pointer;text-decoration:underline}
  /* 확인 모달 */
  .overlay{position:fixed;inset:0;background:rgba(70,45,60,.4);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);
     display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;animation:fadeUp .2s ease}
  .modal{max-width:330px;width:100%;text-align:center}
  .modal .em{font-size:2.2rem}
  .modal h2{margin:6px 0 6px}
  .modal .row2{display:flex;gap:10px;margin-top:18px}
  .modal .row2 button{flex:1;padding:13px;border-radius:14px;font-weight:800;font-size:1rem;cursor:pointer;border:none}
  .modal .cancel{background:var(--accent-soft);color:var(--accent-ink)}
  .modal .danger{background:linear-gradient(135deg,#ff8fa8,#ff6f95);color:#fff;box-shadow:0 8px 20px rgba(255,120,150,.35)}
</style>
</head>

<script>
/* ---------- 데이터: 검증된 운동 영상 풀(전부 oembed로 실재 확인) + 규칙 식단 (백엔드 없음) ---------- */
const DATA = {
  warmup: "제자리 걷기·팔·다리 돌리기 2~3분",
  videos: {
    A1:{title:"다이어트를 위한 10분 전신 유산소 (초급자 홈트 ver.)",channel:"제로키니",id:"4svDlVTjwMM"},
    A2:{title:"10분 전신 다이어트 운동 (초보자도 쉽게)",channel:"권코치의 핏튜브",id:"DJ48Cnv0V-Q"},
    A3:{title:"층간소음 없는 유산소 운동, 신나는 15분!",channel:"건강한 여정",id:"_y3EnjzqP_E"},
    A4:{title:"집에서 칼로리 불태우는 홈트 유산소 - 가볍게 15분",channel:"비너스핏 Anybody",id:"pUq1JIQFMwE"},
    A5:{title:"하루 15분! 전신 칼로리 불태우는 다이어트 운동",channel:"땅끄부부",id:"swRNeYw1JkY"},
    A6:{title:"매일 10분. 전신운동 1~2단계",channel:"KSPO 국민체육진흥공단",id:"xt5WbUKZ_lA"},
    A7:{title:"무조건 살이 쭉쭉 빠지는 전신 홈트",channel:"엄마TV",id:"62vhDOwrhcc"},
    L1:{title:"예쁜 다리 만드는 허벅지 운동 (세모핏 #109)",channel:"굿라이프",id:"b4BumlGOgGk"},
    C1:{title:"뱃살 쏙 빠지는 세상 쉬운 복부 코어 운동 (함아름 강사)",channel:"건나무TV",id:"xKRE0aTqAeU"},
    C2:{title:"뱃살빼는 운동 10분 루틴 (카이스트 해리)",channel:"일지의 브레인TV",id:"ixMRvFiVjiA"},
    C3:{title:"뱃살·내장지방 벽 짚고 하는 복부 운동",channel:"인간미 넘치는 건강멘토",id:"Rp397m7Dqo0"},
    U1:{title:"여자 등 운동 루틴 (상체 긴 타입)",channel:"제이제이살롱드핏",id:"0cHUrFQdnho"},
    U2:{title:"단기간에 확 빠지는 팔뚝살 운동 10분 (초보)",channel:"소피요가 Sophie Yoga",id:"X2VjRyQ5A64"},
    U3:{title:"팔뚝살 타파 팔 운동 홈트",channel:"ns윤지",id:"tn_u7jpmK8M"},
    S1:{title:"자기 전·아침에 따라하는 스트레칭",channel:"피지컬갤러리",id:"aTcbqto_Tg0"},
    S2:{title:"자기 전 스트레칭 (GOOD NIGHT STRETCHING)",channel:"강하나 스트레칭",id:"Q-C_NUKQr9g"},
    MC1:{title:"뱃살이 흘러내리는 20분 유산소 (도구X)",channel:"다솔맘 홈트레이닝",id:"QjuHjh1f12g"},
    MF1:{title:"슬림 탄탄해지는 여자 전신 홈트 루틴",channel:"홈블리 FITVELY",id:"ayM9g-N-yAo"},
    MF2:{title:"집에서 확실하게 근력 기르는 여자 근력운동",channel:"Minsoo Go",id:"d6pLCo6Ck0k"},
    HC1:{title:"30분 고강도 유산소 홈트 (땀폭발)",channel:"다노언니 제시",id:"UJzXSQv0MbA"},
    HC2:{title:"칼로리 불태우는 땀폭발 10분 전신 유산소",channel:"에이핏 afit",id:"xHes9dxefDs"},
    HH1:{title:"20분 고강도 인터벌 HIIT 홈트",channel:"빅씨스 Bigsis",id:"5bukb6aeobs"},
    HF1:{title:"전신 살빼기 FULLBODY HIIT (지방연소)",channel:"Allblanc TV",id:"oEuy2mNjuTI"},
    HCO1:{title:"HIIT 15분 · 복근 라인 드러나는 고강도",channel:"빅씨스 Bigsis",id:"IgsyvlKKFzM"}
  }
};
/* 주간 템플릿(7일 패턴)을 입력 기간(주)만큼 반복 → 기간에 맞는 프로그램 자동 생성 */
const WEEK_TEMPLATE = [
  {focus:"전신 유산소",      warmup:true,  pools:["cardio"]},
  {focus:"하체 + 코어",      warmup:true,  pools:["lower","core"]},
  {focus:"회복·스트레칭",     warmup:false, pools:["stretch"]},
  {focus:"상체 + 코어",      warmup:true,  pools:["upper","core"]},
  {focus:"전신 유산소",      warmup:true,  pools:["cardio"]},
  {focus:"전신 근력·올인원",  warmup:true,  pools:["fullbody"]},
  {focus:"휴식",            warmup:false, pools:["stretch"], rest:true}
];
/* 난이도 모드별 영상 풀 — 초보/중급/빡센 각기 다른 엄선 영상 */
const POOLS_BY_MODE = {
  beginner:{
    cardio:["A1","A2","A3","A4","A5"], fullbody:["A6","A7"], lower:["L1"],
    core:["C1","C2","C3"], upper:["U1","U2","U3"], stretch:["S1","S2"]
  },
  intermediate:{
    cardio:["MC1","A5","A4","A3"], fullbody:["MF1","MF2","A6"], lower:["MF2","L1"],
    core:["C2","C3","C1"], upper:["MF1","U1","U3"], stretch:["S1","S2"]
  },
  hard:{
    cardio:["HC1","HC2","HH1"], fullbody:["HF1","HH1"], lower:["HF1","HH1"],
    core:["HCO1","HH1"], upper:["HF1","HCO1"], stretch:["S1","S2"]
  }
};
const MODES = {
  beginner:{l:"초보자",d:"기초 10~15분·저강도"},
  intermediate:{l:"중급자",d:"15~20분·근력＋유산소 강화"},
  hard:{l:"빡센(고강도)",d:"HIIT·고강도 20~30분"}
};
function buildProgram(weeks, mode){
  const POOLS=POOLS_BY_MODE[mode]||POOLS_BY_MODE.beginner;
  const ptr={}, days=[], total=weeks*7;
  for(let i=0;i<total;i++){
    const t=WEEK_TEMPLATE[i%7];
    const main=t.pools.map(pn=>{
      const arr=POOLS[pn]||POOLS_BY_MODE.beginner[pn]; const k=arr[(ptr[pn]||0)%arr.length]; ptr[pn]=(ptr[pn]||0)+1; return k;
    });
    days.push({day:i+1, week:Math.floor(i/7)+1, focus:t.focus, warmup:t.warmup, main, rest:!!t.rest});
  }
  return days;
}

/* ---------- 저장: 프로필=URL 해시 p=(개인·비공유), 그룹연동=URL 해시 g=(초대용), 완료기록=localStorage ---------- */
function saveProfile(p){ try{ const g=location.hash.match(/g=([^&]+)/); let h="p="+btoa(encodeURIComponent(JSON.stringify(p))); if(g) h+="&g="+g[1]; location.hash=h; }catch(e){} }
function loadProfile(){
  try{ const m=location.hash.match(/p=([^&]+)/); if(!m) return null;
    return JSON.parse(decodeURIComponent(atob(m[1]))); }catch(e){ return null; }
}
let _mem=[];
function loadDone(){ try{ return JSON.parse(localStorage.getItem("diet_done")||"[]"); }catch(e){ return _mem; } }
function saveDone(a){ try{ localStorage.setItem("diet_done",JSON.stringify(a)); }catch(e){ _mem=a; } }

/* ---------- 함께하기(그룹): 구글시트 + Apps Script, JSONP로 CORS 없이 읽기·쓰기 ---------- */
function loadGroup(){ try{ const m=location.hash.match(/g=([^&]+)/); if(!m) return {}; return JSON.parse(decodeURIComponent(atob(m[1]))); }catch(e){ return {}; } }
function saveGroup(g){ const pm=location.hash.match(/p=([^&]+)/); let h=pm?("p="+pm[1]):""; if(g&&g.endpoint){ h+=(h?"&":"")+"g="+btoa(encodeURIComponent(JSON.stringify({endpoint:g.endpoint}))); } location.hash=h; }
function inviteLink(){ const g=loadGroup(); const base=location.href.split("#")[0]; return base+"#g="+btoa(encodeURIComponent(JSON.stringify({endpoint:g.endpoint}))); }
function jsonp(params){ return new Promise((res,rej)=>{ const g=loadGroup(); if(!g.endpoint) return rej("no-endpoint");
  const cb="__cb"+Math.random().toString(36).slice(2); const s=document.createElement("script");
  const to=setTimeout(()=>{ cleanup(); rej("timeout"); },8000);
  function cleanup(){ clearTimeout(to); try{ delete window[cb]; }catch(e){} if(s.parentNode) s.remove(); }
  window[cb]=(d)=>{ cleanup(); res(d); };
  s.onerror=()=>{ cleanup(); rej("net"); };
  const q=new URLSearchParams(Object.assign({},params,{callback:cb,_:Date.now()}));
  s.src=g.endpoint+(g.endpoint.indexOf("?")<0?"?":"&")+q.toString(); document.body.appendChild(s); }); }
function postProgress(p){ const g=loadGroup(); if(!g.endpoint||!p.name) return Promise.resolve(null);
  const total=p.weeks*7; const done=loadDone().filter(d=>d>=1&&d<=total).length;
  return jsonp({action:"update",group:"main",name:p.name,total:total,done:done,achieved:p.achieved?"1":"0"}).catch(()=>null); }

/* ---------- 계산 (Mifflin-St Jeor, 여성) + 안전 게이트 ---------- */
function compute(p){
  const hM=p.height/100;
  const bmr=10*p.curWeight+6.25*p.height-5*p.age-161;      // 여성 공식
  const tdee=bmr*ACT[p.activity].f;
  const targetBMI=p.targetWeight/(hM*hM);
  const minHealthy=18.5*hM*hM;
  const totalLoss=p.curWeight-p.targetWeight;
  const weeklyRate=totalLoss/p.weeks;
  const FLOOR=1200; let target=Math.round(tdee-500), floored=false;   // 약 0.5kg/주 적자
  if(target<FLOOR){ target=FLOOR; floored=true; }
  return {bmr,tdee,targetBMI,minHealthy,totalLoss,weeklyRate,target,floored};
}
function validate(p){
  const errs=[], hard=[];
  if(p.pregnant) hard.push("임신 또는 수유 중이라고 표시하셨어요. 이 시기에는 임의로 체중 감량을 하면 안 됩니다. 산부인과·전문의와 상담해 주세요.");
  if(p.eatingDisorder) hard.push("섭식장애 이력을 표시하셨어요. 이 앱 대신 전문가(정신건강의학과·영양 전문가)의 도움을 받는 것을 권합니다.");
  if(hard.length) return {hard};
  const c=compute(p);
  if(c.totalLoss<=0) errs.push("목표 체중이 현재와 같거나 더 높아요. 이 앱은 체중 감량용이에요 — 목표를 현재보다 낮게 입력해 주세요.");
  if(c.targetBMI<18.5) errs.push("목표 체중이 저체중(BMI 18.5 미만) 범위예요. 건강을 위해 목표를 최소 약 "+c.minHealthy.toFixed(1)+"kg 이상으로 조정해 주세요.");
  if(c.weeklyRate>1) errs.push("이 기간에는 주당 "+c.weeklyRate.toFixed(2)+"kg 감량이 필요해요. 안전 범위는 주 0.5~1kg예요 — 기간을 최소 "+Math.ceil(c.totalLoss/1)+"주로 늘리거나 목표를 완화해 주세요.");
  return {errs,c};
}

  return Math.min(totalDays(p),Math.max(1,diff||1));

      <div class="sched">${program.map(d=>{
        const dn=done.includes(d.day);
        return `<button class="scell${dn?' done':''}${d.day===day?' cur':''}${d.rest?' rest':''}" data-day="${d.day}" title="${d.week}주차 · ${esc(d.focus)}">${(d.rest&&!dn)?'휴':d.day}</button>`;
      }).join('')}</div>
      <div class="slegend"><span><i class="dot d1"></i>완료</span><span><i class="dot d2"></i>오늘</span><span><i class="dot d3"></i>휴식</span></div>
    </div>

    <div class="card" id="groupCard"></div>

    <div class="tools">
      <button id="share">오늘 플랜 공유</button>
      <button id="reset">내 정보 다시 설정</button>
    </div>

    <p class="footer">이 앱은 일반 건강 정보 제공용이며 의료 조언이 아닙니다. 통증·어지럼이 있으면 즉시 멈추세요.<br>임신·수유·질환이 있으면 전문의와 상담하세요.</p>`;

  const pv=document.getElementById("prev"), nx=document.getElementById("next");
  if(pv) pv.onclick=()=>renderDash(p,day-1);
  if(nx) nx.onclick=()=>renderDash(p,day+1);
  document.getElementById("done").onclick=()=>{
    let d=loadDone(); if(d.includes(day)) d=d.filter(x=>x!==day); else d.push(day);
    saveDone(d); renderDash(p,day);
  };
  document.getElementById("reset").onclick=()=>confirmReset();
  document.getElementById("share").onclick=()=>{
    const txt=`[오늘의 다이어트 플랜 · DAY ${day}/${total}]\n목표 칼로리 ${c.target}kcal\n운동: ${plan.focus}\n${vids.map(v=>'▶ '+v.title+' ('+v.channel+') https://youtu.be/'+v.id).join('\n')}`;
    if(navigator.share){ navigator.share({text:txt}).catch(()=>{}); }
    else if(navigator.clipboard){ navigator.clipboard.writeText(txt); alert("오늘 플랜을 복사했어요. 카톡에 붙여넣기 하세요!"); }
    else { alert(txt); }
  };

  Array.from(document.querySelectorAll('.scell')).forEach(el=>{ el.onclick=()=>renderDash(p, +el.dataset.day); });
  renderGroupCard(p);
  postProgress(p);
}

/* ---------- 함께하기 카드 ---------- */
function appBaseUrl(){ return location.href.split(/[?#]/)[0]; }
function shareOrCopy(text, url, doneMsg){
  if(navigator.share){ const pl={title:"다이어트 함께하기", text:text}; if(url) pl.url=url; navigator.share(pl).catch(()=>{}); }
  else if(navigator.clipboard){ navigator.clipboard.writeText(text+(url?("\n"+url):"")); alert(doneMsg||"복사했어요. 카카오톡에 붙여넣기 하세요!"); }
  else { alert(text+(url?("\n"+url):"")); }
}
function progressLine(p){
  const total=p.weeks*7; const done=loadDone().filter(d=>d>=1&&d<=total).length;
  const pct=total?Math.round(done/total*100):0; const cur=currentDayFor(p);
  const nm=(p.name||"나"); const em=pct>=80?"🏆":pct>=40?"🔥":"💪";
  return `[다이어트 함께하기] ${nm} · DAY ${cur}/${total} · 완료율 ${pct}% ${em}${p.achieved?" · 목표달성!":""}`;
}
function renderGroupCard(p){
  const el=document.getElementById("groupCard"); if(!el) return;
  const g=loadGroup();
  const invite="우리 같이 홈트 다이어트 해요! 💗\n각자 이 앱에서 내 플랜 받고, 매일 완료하면 단톡방에 진행 공유해요 👇";
  const inviteUrl=g.endpoint?inviteLink():appBaseUrl();
  el.innerHTML=`<h2>👭 함께하기</h2>
    <p class="note" style="margin-top:0">설정 없이 바로 시작! 친구를 카카오톡으로 초대하고, 매일 진행을 단톡방에 공유하며 함께 해요. (진행률만 공유돼요)</p>
    <button class="btn" id="kkInvite">💬 카카오톡으로 초대하기</button>
    <button class="done-btn" id="kkShare" style="margin-top:10px;width:100%">📤 내 진행 카톡으로 공유</button>
    <label class="check"><input id="achv" type="checkbox" ${p.achieved?"checked":""}> 목표를 달성했어요 🎉 (공유 메시지에 표시)</label>
    ${g.endpoint?`
      <div style="margin-top:14px">
        <div id="board" class="note">불러오는 중…</div>
        <button class="linklike" id="refresh" style="margin-top:6px">↻ 실시간 진행판 새로고침</button>
      </div>`:`
      <button class="linklike" id="advToggle" style="margin-top:12px">고급: 실시간 자동 진행판 연동 ▾</button>
      <div id="advBox" style="display:none;margin-top:8px">
        <p class="note">구글시트 연동 주소(Apps Script …/exec)를 넣으면, 카톡 공유 없이 앱 안에서 서로 진행이 자동으로 떠요. (설정 필요)</p>
        <input id="epInput" type="text" placeholder="https://script.google.com/macros/s/.../exec">
        <button class="btn ghost" id="epGo" style="margin-top:8px">자동 진행판 연동</button>
      </div>`}`;
  el.querySelector("#kkInvite").onclick=()=>shareOrCopy(invite, inviteUrl, "초대 메시지를 복사했어요! 카카오톡 단톡방에 붙여넣기 하세요.");
  el.querySelector("#kkShare").onclick=()=>shareOrCopy(progressLine(p), null, "내 진행을 복사했어요! 카톡 단톡방에 붙여넣기 하세요.");
  const achv=el.querySelector("#achv");
  if(achv) achv.onchange=(e)=>{ p.achieved=e.target.checked; saveProfile(p); if(loadGroup().endpoint) postProgress(p).then(()=>loadBoard()); };
  const adv=el.querySelector("#advToggle");
  if(adv) adv.onclick=()=>{ const bx=el.querySelector("#advBox"); bx.style.display=(bx.style.display==="none")?"block":"none"; };
  const epGo=el.querySelector("#epGo");
  if(epGo) epGo.onclick=()=>{
    const ep=el.querySelector("#epInput").value.trim();
    if(!/^https:\/\/script\.google\.com\/macros\/.*\/exec/.test(ep)){ alert("올바른 Apps Script 웹앱 URL(…/exec)을 넣어주세요."); return; }
    saveGroup({endpoint:ep}); postProgress(p); renderGroupCard(p);
  };
  const rf=el.querySelector("#refresh");
  if(rf) rf.onclick=()=>loadBoard();
  if(g.endpoint) loadBoard();
}
function loadBoard(){
  const b=document.getElementById("board"); if(!b) return;
  const me=((loadProfile()||{}).name||"").trim();
  jsonp({action:"list",group:"main"}).then(d=>{
    if(!d||!d.ok||!Array.isArray(d.members)){ b.textContent="아직 그룹 데이터를 불러올 수 없어요. 설정을 확인해 주세요."; return; }
    if(!d.members.length){ b.textContent="아직 참여자가 없어요. 초대 링크를 보내보세요!"; return; }
    const totalDone=d.members.reduce((s,m)=>s+(+m.done||0),0);
    const avg=Math.round(d.members.reduce((s,m)=>s+(m.total?(m.done/m.total*100):0),0)/d.members.length);
    const rows=d.members.map(m=>{
      const pct=m.total?Math.min(100,Math.round(m.done/m.total*100)):0;
      const mine=(m.name||"").trim()===me;
      return `<div class="mcard${mine?" me":""}">`
        +`<div class="mtop"><span class="mn">${esc(m.name)}${m.achieved?" 🎉":""}</span>`
        +`<span class="mp">${m.done}/${m.total}일 · ${pct}%${m.achieved?" · 목표달성":""}</span></div>`
        +`<div class="mbar"><div class="mfill" style="width:${pct}%"></div></div></div>`;
    }).join("");
    b.innerHTML=`<div class="gsum">함께 완료한 날 <b>${totalDone}</b>일 · 그룹 평균 <b>${avg}%</b></div>`+rows;
  }).catch(()=>{ b.textContent="연결 대기 중… 창작자가 그룹 설정을 마치면 표시돼요."; });
}

function confirmReset(){
  const ov=document.createElement("div"); ov.className="overlay";
  ov.innerHTML=`<div class="modal card">
    <div class="em">⚠️</div>
    <h2>처음부터 다시 설정할까요?</h2>
    <p class="note">입력한 정보가 초기화되고 처음 화면으로 돌아가요.<br>(완료 기록은 그대로 남아요)</p>
    <div class="row2"><button class="cancel" id="cCancel">취소</button><button class="danger" id="cOk">초기화</button></div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector("#cCancel").onclick=close;
  ov.addEventListener("click",e=>{ if(e.target===ov) close(); });
  ov.querySelector("#cOk").onclick=()=>{ close(); location.hash=""; start(); };
}
function start(){
  const p=loadProfile();
  if(p && p.startDate) renderDash(p,currentDayFor(p));
  else renderOnboard();
}
start();
</script>
